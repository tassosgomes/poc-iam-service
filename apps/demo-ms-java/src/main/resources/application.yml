server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: demo-ms-java
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CYBERARK_ISSUER:http://localhost:8080/default}
  threads:
    virtual:
      enabled: true

authz:
  enabled: true
  base-url: ${AUTHZ_SERVICE_BASE_URL:http://localhost:8081}
  module-id: vendas
  module-key: ${AUTHZ_MODULE_KEY:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,authzRegistrationReadiness
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
