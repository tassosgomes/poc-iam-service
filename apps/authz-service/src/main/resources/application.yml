server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: authz-service
  datasource:
    url: ${AUTHZ_DB_URL:jdbc:postgresql://localhost:5432/authz}
    username: ${AUTHZ_DB_USER:authz}
    password: ${AUTHZ_DB_PASS:authz}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${cyberark.issuer-uri}
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  resource:
    attributes:
      service.name: ${spring.application.name}
      deployment.environment: ${app.environment:dev}

app:
  environment: ${APP_ENVIRONMENT:dev}

cyberark:
  issuer-uri: ${CYBERARK_ISSUER:http://localhost:8080/default}
  user-api-base-url: ${CYBERARK_USER_API_BASE_URL:http://localhost:8080/api/users}

resilience4j:
  circuitbreaker:
    instances:
      cyberark:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
  retry:
    instances:
      cyberark:
        max-attempts: 2
        wait-duration: 500ms
