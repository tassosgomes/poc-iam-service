name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PortalArquitetura.slnx

      - name: Build
        run: dotnet build PortalArquitetura.slnx --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test 5-Tests/PortalArquitetura.UnitTests/PortalArquitetura.UnitTests.csproj --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test -- --run

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/portal-api:${{ github.sha }} -f Dockerfile .

      - name: Build Frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/portal-frontend:${{ github.sha }} -f frontend/Dockerfile ./frontend

      - name: Push API image
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository_owner }}/portal-api:${{ github.sha }}

      - name: Push Frontend image
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository_owner }}/portal-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [containers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Update backend image
        run: kubectl -n portal-arquitetura set image deployment/backend backend=ghcr.io/${{ github.repository_owner }}/portal-api:${{ github.sha }}

      - name: Update frontend image
        run: kubectl -n portal-arquitetura set image deployment/frontend frontend=ghcr.io/${{ github.repository_owner }}/portal-frontend:${{ github.sha }}

      - name: Wait rollout
        run: |
          kubectl -n portal-arquitetura rollout status deployment/backend
          kubectl -n portal-arquitetura rollout status deployment/frontend
