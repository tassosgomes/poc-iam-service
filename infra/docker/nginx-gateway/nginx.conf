user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request time and upstream info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ========================================
    # Upstream Definitions
    # ========================================

    # CyberArk Mock OAuth2 Server
    upstream cyberark {
        server cyberark-mock:8080;
        keepalive 16;
    }

    # ========================================
    # Main Server Block
    # ========================================
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ========================================
        # Health Check Endpoint (for nginx itself)
        # ========================================
        location /health {
            access_log off;
            return 200 "nginx gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # ========================================
        # CyberArk Mock (OAuth2 / OIDC)
        # ========================================
        location /oidc/ {
            # Rewrite /oidc/* to /default/*
            rewrite ^/oidc/(.*)$ /default/$1 break;
            
            proxy_pass http://cyberark;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /oidc;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        location /default/ {
            proxy_pass http://cyberark;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # ========================================
        # AuthZ Service API
        # ========================================
        location /api/ {
            set $authz_service http://authz-service:8081;
            proxy_intercept_errors on;
            error_page 502 503 504 = @authz_service_unavailable;

            proxy_pass $authz_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ========================================
        # Demo MS Java (Sales Service)
        # ========================================
        # location /api/demo-java/ {
        #     proxy_pass http://demo-ms-java/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header Connection "";
        #     proxy_set_header Authorization $http_authorization;
        #     
        #     proxy_connect_timeout 10s;
        #     proxy_send_timeout 30s;
        #     proxy_read_timeout 30s;
        # }

        # ========================================
        # Demo MS .NET (Stock Service)
        # ========================================
        # location /api/demo-dotnet/ {
        #     proxy_pass http://demo-ms-dotnet/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header Connection "";
        #     proxy_set_header Authorization $http_authorization;
        #     
        #     proxy_connect_timeout 10s;
        #     proxy_send_timeout 30s;
        #     proxy_read_timeout 30s;
        # }

        # ========================================
        # PAP UI (Admin MFE)
        # ========================================
        location = /pap {
            return 302 /pap/;
        }

        location /pap/ {
            set $pap_ui http://pap-ui:80;
            proxy_intercept_errors on;
            error_page 502 503 504 = @pap_ui_unavailable;

            proxy_pass $pap_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ========================================
        # Demo MFE (Sales Demo)
        # ========================================
        location = /demo {
            return 302 /demo/;
        }

        location /demo/ {
            set $demo_mfe http://demo-mfe:80;
            proxy_intercept_errors on;
            error_page 502 503 504 = @demo_mfe_unavailable;

            proxy_pass $demo_mfe;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ========================================
        # App Shell (React Host MFE) - Root Path
        # ========================================
        location / {
            set $app_shell http://app-shell:80;
            proxy_intercept_errors on;
            error_page 502 503 504 = @app_shell_unavailable;

            proxy_pass $app_shell;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location @app_shell_unavailable {
            return 503 "App Shell route is wired, but the app-shell container is not available yet.\n";
            add_header Content-Type text/plain;
        }

        location @pap_ui_unavailable {
            return 503 "PAP UI route is wired, but the pap-ui container is not available yet.\n";
            add_header Content-Type text/plain;
        }

        location @demo_mfe_unavailable {
            return 503 "Demo MFE route is wired, but the demo-mfe container is not available yet.\n";
            add_header Content-Type text/plain;
        }

        location @authz_service_unavailable {
            return 503 "AuthZ API route is wired, but the authz-service container is not available yet.\n";
            add_header Content-Type text/plain;
        }
    }
}
