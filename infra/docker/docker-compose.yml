      context: ../../
      dockerfile: apps/demo-ms-java/Dockerfile
    container_name: authz-demo-ms-java
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AUTHZ_SERVICE_BASE_URL: http://authz-service:8081
      AUTHZ_MODULE_KEY: ${AUTHZ_MODULE_KEY_VENDAS}
      CYBERARK_ISSUER: http://cyberark-mock:8080/default
