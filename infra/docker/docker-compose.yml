services:
  # ========================================
  # Postgres Database
  # ========================================
  postgres:
    image: postgres:16.1-alpine
    container_name: authz-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - authz-network

  # ========================================
  # CyberArk Mock (OAuth2 Server)
  # ========================================
  cyberark-mock:
    build:
      context: ./cyberark-mock
      dockerfile: Dockerfile
    container_name: authz-cyberark-mock
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - authz-network

  # ========================================
  # Nginx Gateway (Reverse Proxy)
  # ========================================
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: authz-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      cyberark-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - authz-network

  # ========================================
  # AuthZ Service (Backend - Java/Spring Boot)
  # ========================================
  authz-service:
    build:
      context: ../../apps/authz-service
      dockerfile: Dockerfile
    container_name: authz-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8081
      AUTHZ_DB_URL: jdbc:postgresql://postgres:5432/authz
      AUTHZ_DB_USER: authz
      AUTHZ_DB_PASS: ${AUTHZ_DB_PASS:-authz}
      CYBERARK_ISSUER: http://cyberark-mock:8080/default
      CYBERARK_USER_API_BASE_URL: http://cyberark-mock:8080/api/users
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "18081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      cyberark-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - authz-network

  # ========================================
